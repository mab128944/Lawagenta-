<script>
// PRIVACY: contact info piece by piece
const _p = {
  w: '92'+'30'+'20'+'78'+'64'+'76',
  e: ['azeem','.','anwar','.','b','@','gmail','.','com'].join('')
};
function openWA(){window.open('https://wa.me/'+_p.w+'?text=Hi+LawAgenta!+I+need+free+legal+help.','_blank')}
function go(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth'})}

// GOOGLE SHEETS URL FIX
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzhc_V0hxSUQMj-4-kCDlmDIWYnI4iLG73VXA5NdcEvijIT8gXB4CbRp8al-8Gmn66dLA/exec';

async function submitForm(e){
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const fd = new FormData(e.target);
  const data = {
    name: fd.get('name'),
    phone: fd.get('phone'),
    email: fd.get('email'),
    service: fd.get('service'),
    message: fd.get('message') || ''
  };
  btn.textContent = 'Sending...';
  btn.disabled = true;
  try{
    // Real fetch call
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(data)});
    document.getElementById('mainForm').style.display = 'none';
    document.getElementById('sucBox').style.display = 'block';
  } catch(err){
    console.error('Error!', err);
    btn.textContent = 'Join Free — Get Early Access 🎁';
    btn.disabled = false;
    alert('Network error. Please try WhatsApp.');
    openWA();
  }
}

// ... Baki sara Chatbot script (handleFileSelect, sendBotMsg, etc) ...
</script>
